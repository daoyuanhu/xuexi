<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Price</title>
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}
#price{
    color:#fff;
    font-size:120px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="price">Loading...</div>

<script>
async function getGoldPrice(){
    try{
        const url = encodeURIComponent("https://api.exchangerate.host/latest?base=USD&symbols=XAU");
        const response = await fetch(`https://api.allorigins.win/get?url=${url}`);
        const dataText = await response.json();
        const data = JSON.parse(dataText.contents);
        const price = 1 / data.rates.XAU;
        document.getElementById("price").innerText = price.toFixed(2);
    }catch(e){
        console.log(e);
    }
}

getGoldPrice();
setInterval(getGoldPrice, 5000);
</script>

</body>
</html>
